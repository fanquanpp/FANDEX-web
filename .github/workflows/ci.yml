name: CI

# CI 流水线分层触发策略：
# - changes job 检测变更范围（docs / code / ci_config）
# - 各 job 根据变更类型条件执行步骤，避免无意义的全量检查
# - 纯文档 PR：跳过 type-check / unit-test / lighthouse
# - 纯代码 PR：跳过 lint:docs
# - CI 配置变更：全量检查（防止 CI 本身回归）
# - 8 个 job 名称保持不变，与分支保护 required status checks 对齐
#
# 阶段顺序：changes → lint / type-check / unit-test → build → e2e-test / qa-check / lighthouse → deploy
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# 并发控制：PR 取消旧 run 节省 runner 时间；main 分支不取消以保证部署完整性
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─────────────────────────────────────────────────────────────
  # 阶段 0：变更范围检测
  # 用 git diff 原生命令检测本次推送的文件变更范围（不依赖第三方 action）
  # 输出三个布尔值：docs / code / ci_config
  # 后续 job 根据这三个值决定是否执行实际工作
  # ─────────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      docs: ${{ steps.detect.outputs.docs }}
      code: ${{ steps.detect.outputs.code }}
      ci_config: ${{ steps.detect.outputs.ci_config }}
    steps:
      - uses: actions/checkout@v5
        with:
          # pull_request 事件需要获取 base 和 head 之间的差异
          # fetch-depth: 0 获取完整历史，确保 git diff 能正确比较
          fetch-depth: 0

      - name: Detect change scope
        id: detect
        run: |
          # 确定比较基准
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            # push 事件：与上一个 commit 比较（首次推送时 fallback 到自身）
            BASE="${{ github.event.before }}"
            HEAD="${{ github.event.after }}"
            # before 为 0000... 表示新分支，此时与 HEAD~1 比较
            if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE="HEAD~1"
            fi
          fi

          echo "Comparing $BASE..$HEAD"

          # 获取变更文件列表（ Added, Copied, Modified, Renamed 类型，排除 Deleted）
          if git rev-parse --verify "$BASE^{commit}" >/dev/null 2>&1; then
            FILES=$(git diff --name-only --diff-filter=ACMR "$BASE" "$HEAD" || echo "")
          else
            # base 不存在时（孤儿分支等极端情况），列出所有文件
            FILES=$(git ls-files)
          fi

          # 默认设置为 false
          DOCS="false"
          CODE="false"
          CI_CONFIG="false"

          # 逐文件匹配
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            # docs: src/content/docs/ 下的文档
            case "$file" in
              src/content/docs/*)
                DOCS="true"
                ;;
              .github/*|.husky/*)
                CI_CONFIG="true"
                ;;
              src/components/*|src/config/*|src/islands/*|src/layouts/*|src/lib/*|src/pages/*|src/services/*|src/styles/*|src/types/*|src/ui/*|src/workers/*|src/content.config.ts|src/env.d.ts|scripts/*|public/*|astro.config.ts|tsconfig.json|package.json|package-lock.json|playwright.config.*|vitest.config.*|lighthouse-budget.json|remark.config.*|.prettierrc*|.remarkrc*)
                CODE="true"
                ;;
            esac
          done <<< "$FILES"

          echo "docs=$DOCS" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "ci_config=$CI_CONFIG" >> "$GITHUB_OUTPUT"

          echo "Change scope detection:"
          echo "  docs      = $DOCS"
          echo "  code      = $CODE"
          echo "  ci_config = $CI_CONFIG"
          echo "  files changed:"
          echo "$FILES" | sed 's/^/    /'

  # ─────────────────────────────────────────────────────────────
  # 阶段 1：代码风格与文档格式检查
  # - docs 变更：跑 remark lint（markdown 格式）
  # - code 变更：跑 Prettier check（代码风格）
  # - ci_config 变更：两者都跑
  # - 都不变更：跳过实际工作，job 状态 success（满足分支保护）
  # ─────────────────────────────────────────────────────────────
  lint:
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # 无相关变更时仅运行此步骤，job 状态 success
      - name: Skip (no relevant changes)
        if: ${{ needs.changes.outputs.docs != 'true' && needs.changes.outputs.code != 'true' && needs.changes.outputs.ci_config != 'true' }}
        run: echo "No docs/code/ci_config changes, skipping lint"

      - name: Checkout
        if: ${{ needs.changes.outputs.docs == 'true' || needs.changes.outputs.code == 'true' || needs.changes.outputs.ci_config == 'true' }}
        uses: actions/checkout@v5

      - name: Setup Node.js
        if: ${{ needs.changes.outputs.docs == 'true' || needs.changes.outputs.code == 'true' || needs.changes.outputs.ci_config == 'true' }}
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: ${{ needs.changes.outputs.docs == 'true' || needs.changes.outputs.code == 'true' || needs.changes.outputs.ci_config == 'true' }}
        run: npm ci

      - name: Run remark lint (docs changes)
        if: ${{ needs.changes.outputs.docs == 'true' || needs.changes.outputs.ci_config == 'true' }}
        run: npm run lint:docs

      - name: Run Prettier check (code changes)
        if: ${{ needs.changes.outputs.code == 'true' || needs.changes.outputs.ci_config == 'true' }}
        run: npm run format:check

  # ─────────────────────────────────────────────────────────────
  # 阶段 2：TypeScript 类型检查
  # 仅 code 或 ci_config 变更时执行；纯文档 PR 跳过实际工作
  # ─────────────────────────────────────────────────────────────
  type-check:
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Skip (no code changes)
        if: ${{ needs.changes.outputs.code != 'true' && needs.changes.outputs.ci_config != 'true' }}
        run: echo "No code changes, skipping type-check"

      - name: Checkout
        if: ${{ needs.changes.outputs.code == 'true' || needs.changes.outputs.ci_config == 'true' }}
        uses: actions/checkout@v5

      - name: Setup Node.js
        if: ${{ needs.changes.outputs.code == 'true' || needs.changes.outputs.ci_config == 'true' }}
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: ${{ needs.changes.outputs.code == 'true' || needs.changes.outputs.ci_config == 'true' }}
        run: npm ci

      - name: Run type check
        if: ${{ needs.changes.outputs.code == 'true' || needs.changes.outputs.ci_config == 'true' }}
        run: npm run type-check

  # ─────────────────────────────────────────────────────────────
  # 阶段 3：单元测试 + 覆盖率采集
  # 仅 code 或 ci_config 变更时执行；纯文档 PR 跳过实际工作
  # ─────────────────────────────────────────────────────────────
  unit-test:
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Skip (no code changes)
        if: ${{ needs.changes.outputs.code != 'true' && needs.changes.outputs.ci_config != 'true' }}
        run: echo "No code changes, skipping unit-test"

      - name: Checkout
        if: ${{ needs.changes.outputs.code == 'true' || needs.changes.outputs.ci_config == 'true' }}
        uses: actions/checkout@v5

      - name: Setup Node.js
        if: ${{ needs.changes.outputs.code == 'true' || needs.changes.outputs.ci_config == 'true' }}
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: ${{ needs.changes.outputs.code == 'true' || needs.changes.outputs.ci_config == 'true' }}
        run: npm ci

      - name: Run unit tests with coverage
        if: ${{ needs.changes.outputs.code == 'true' || needs.changes.outputs.ci_config == 'true' }}
        run: npm run test:coverage

      - name: Upload coverage report
        if: ${{ (needs.changes.outputs.code == 'true' || needs.changes.outputs.ci_config == 'true') && always() }}
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # 阶段 4：E2E 冒烟测试
  # 通过本地静态服务器对构建产物做 HTTP 200 冒烟校验，确保关键路由可达
  # 总是执行（文档变更也可能影响路由），但仅 main 分支 push 时需要
  # ─────────────────────────────────────────────────────────────
  e2e-test:
    runs-on: ubuntu-latest
    needs: [build, changes]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Restore .nojekyll
        run: |
          if [ -f public/.nojekyll ]; then
            cp public/.nojekyll dist/.nojekyll
          fi

      - name: Start static server
        run: |
          npx --yes serve -s dist -l 4173 --no-clipboard &
          echo $! > server.pid
          sleep 3

      - name: Smoke test key routes
        # 允许 200/404/301 三种状态码：
        #   200 - 正常可达
        #   404 - 路径不存在但服务正常响应
        #   301 - serve 工具对 .html 后缀的 SPA 重定向（如 /404.html → /404）
        run: |
          set -e
          ROUTES=(
            "/"
            "/FANDEX-web/"
            "/FANDEX-web/agent/"
            "/FANDEX-web/agent/概述与架构/"
            "/FANDEX-web/search/"
            "/FANDEX-web/404.html"
          )
          for route in "${ROUTES[@]}"; do
            echo "Checking: $route"
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:4173${route}")
            if [ "$code" != "200" ] && [ "$code" != "404" ] && [ "$code" != "301" ]; then
              echo "::error::Route $route returned $code (expected 200, 404 or 301)"
              exit 1
            fi
            echo "  -> $code OK"
          done

      - name: Stop static server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi

  # ─────────────────────────────────────────────────────────────
  # 阶段 5：构建产物
  # 依赖 lint / type-check / unit-test 通过（其中部分可能为 skipped 步骤的 success）
  # 文档变更也需要 build（生成新的静态页面）
  # ─────────────────────────────────────────────────────────────
  build:
    needs: [lint, type-check, unit-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Cache Astro build cache
        uses: actions/cache@v5
        with:
          path: .astro
          key: ${{ runner.os }}-astro-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-astro-

      - name: Cache cheatsheet highlights flags
        uses: actions/cache@v5
        with:
          path: .cache/cheatsheet-flags
          key: ${{ runner.os }}-cheatsheet-flags-${{ hashFiles('src/data/cheatsheets/**/*.json') }}
          restore-keys: |
            ${{ runner.os }}-cheatsheet-flags-

      - name: Install dependencies
        run: npm ci

      - name: Install Pagefind Linux x64 binary
        run: npm install --no-save @pagefind/linux-x64

      - name: Build site
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Analyze bundle size
        run: node scripts/analyze-bundle.mjs

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # 阶段 6：QA 质量门禁
  # 依赖 build 产物，运行多维度质量检查（文件审计 / Web 架构 / 内容 / SEO）
  # 总是执行（文档变更也需要内容审计）
  # ─────────────────────────────────────────────────────────────
  qa-check:
    runs-on: ubuntu-latest
    needs: [build, changes]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Restore .nojekyll
        # upload-artifact 默认不上传以点开头的隐藏文件，需在下载后从 public/ 恢复
        # 否则 qa-check 会报 [FAIL] .nojekyll missing，GitHub Pages 也会忽略下划线开头的资源
        run: |
          if [ -f public/.nojekyll ]; then
            cp public/.nojekyll dist/.nojekyll
            echo "Restored .nojekyll from public/"
          else
            echo "::warning::public/.nojekyll not found"
          fi

      - name: Run QA check
        run: npm run qa

  # ─────────────────────────────────────────────────────────────
  # 阶段 7：Lighthouse 性能审计
  # 仅 code 或 ci_config 变更时执行实际审计
  # 纯文档变更对性能预算影响极小，跳过节省 3-5 分钟
  # ─────────────────────────────────────────────────────────────
  lighthouse:
    runs-on: ubuntu-latest
    needs: [build, changes]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Skip (no code changes)
        if: ${{ needs.changes.outputs.code != 'true' && needs.changes.outputs.ci_config != 'true' }}
        run: echo "No code changes, skipping Lighthouse audit"

      - name: Checkout
        if: ${{ needs.changes.outputs.code == 'true' || needs.changes.outputs.ci_config == 'true' }}
        uses: actions/checkout@v5

      - name: Setup Node.js
        if: ${{ needs.changes.outputs.code == 'true' || needs.changes.outputs.ci_config == 'true' }}
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: ${{ needs.changes.outputs.code == 'true' || needs.changes.outputs.ci_config == 'true' }}
        run: npm ci

      - name: Download build artifact
        if: ${{ needs.changes.outputs.code == 'true' || needs.changes.outputs.ci_config == 'true' }}
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Verify LHCI token
        if: ${{ needs.changes.outputs.code == 'true' || needs.changes.outputs.ci_config == 'true' }}
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        run: |
          if [ -z "$LHCI_GITHUB_APP_TOKEN" ]; then
            echo "::warning::LHCI_GITHUB_APP_TOKEN is not set, PR comments will be disabled"
          fi

      - name: Run Lighthouse CI
        if: ${{ needs.changes.outputs.code == 'true' || needs.changes.outputs.ci_config == 'true' }}
        run: npx @lhci/cli autorun --config=./lighthouse-budget.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse report
        if: ${{ (needs.changes.outputs.code == 'true' || needs.changes.outputs.ci_config == 'true') && always() }}
        uses: actions/upload-artifact@v5
        with:
          name: lighthouse-report
          path: |
            .lighthouseci/
            reports/bundle-stats.html
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # 阶段 8：部署至 GitHub Pages
  # 仅 main 分支 push 触发，依赖 build / qa-check / lighthouse / e2e-test 全部通过
  # 使用 actions/deploy-pages 官方部署方式，确保 Pages 配置一致
  # ─────────────────────────────────────────────────────────────
  deploy:
    needs: [build, qa-check, lighthouse, e2e-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Download build artifact
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Restore .nojekyll
        # upload-artifact 默认不上传以点开头的隐藏文件，需在下载后从 public/ 恢复
        run: |
          if [ -f public/.nojekyll ]; then
            cp public/.nojekyll dist/.nojekyll
            echo "Restored .nojekyll from public/"
          else
            echo "::warning::public/.nojekyll not found"
          fi

      - name: Preserve CNAME if exists
        run: |
          if [ -f public/CNAME ]; then
            cp public/CNAME dist/CNAME
            echo "CNAME file preserved in dist/"
          else
            echo "No CNAME file found, skipping"
          fi

      - name: Verify Pagefind index
        run: |
          if [ -d "dist/pagefind" ]; then
            echo "Pagefind index found"
            ls -la dist/pagefind/ | head -5
          else
            echo "::warning::Pagefind index not found - search will not work"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
