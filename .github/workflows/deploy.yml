name: Deploy to GitHub Pages

# 仅支持手动触发部署；常规 push 到 main 的自动部署由 ci.yml 中的
# build → deploy 流水线完成（test Job 作为前置依赖）
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-22.04
    outputs:
      cache-hit: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Cache node_modules
        uses: actions/cache@v5
        id: cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci

  build:
    runs-on: ubuntu-22.04
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Restore node_modules cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Cache Astro build cache
        uses: actions/cache@v5
        with:
          path: .astro
          key: ${{ runner.os }}-astro-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-astro-

      - name: 文档格式检查
        run: npm run lint:docs

      - name: 安装 Pagefind Linux x64 二进制依赖
        run: npm install --no-save @pagefind/linux-x64

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: QA Check
        run: npm run qa

      - name: Preserve CNAME if exists
        run: |
          if [ -f public/CNAME ]; then
            cp public/CNAME dist/CNAME
            echo "CNAME file preserved in dist/"
          else
            echo "No CNAME file found, skipping"
          fi

      - name: Verify Pagefind index
        run: |
          if [ -d "dist/pagefind" ]; then
            echo "Pagefind index found"
            ls -la dist/pagefind/ | head -5
          else
            echo "::warning::Pagefind index not found - search will not work"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: build
          path: dist
          retention-days: 30

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
