name: Content Update & Quality Check

on:
  push:
    branches: [main]
    paths:
      - 'src/content/**'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run content audit
        run: node scripts/content-audit.mjs

      - name: Build search index
        run: node scripts/build-search-index.mjs

      - name: Build glossary index
        run: node scripts/build-glossary-index.mjs

      - name: Commit and push updated indexes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add public/data/search-index.json 2>/dev/null || true
          git add public/data/glossary-index.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore(content): regenerate search and glossary indexes [skip ci]"
          git push origin main || echo "Push failed, likely no changes"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
