name: Lighthouse CI

# 在 PR 时触发，对首页、模块首页、文档详情页三类页面进行 Lighthouse 测量
# 性能预算定义在 lighthouse-budget.json，失败时阻止合并
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Pagefind Linux x64 binary
        run: npm install --no-save @pagefind/linux-x64

      - name: Build site
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Run Lighthouse CI
        run: npx lhci autorun --config=./lighthouse-budget.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: |
            .lighthouseci/
            reports/bundle-stats.html
          retention-days: 30
