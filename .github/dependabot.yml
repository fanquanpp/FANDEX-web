# Dependabot 配置文件 - FANDEX-web 仓库
# 技术栈: Astro SSG + npm
# 生态系统: npm + github-actions
# 维护策略: 每周一 09:00 (Asia/Shanghai) 检查依赖更新
# 安全策略: npm 生态忽略 major 版本自动升级, 避免破坏稳定性
version: 2
updates:
  # npm 生态配置 - 主项目依赖
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    versioning-strategy: "increase"
    # 分组策略: 将相关依赖合并到同一 PR, 减少 PR 数量
    groups:
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
    # 忽略 major 版本升级, 需手动评估
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
  # GitHub Actions 生态配置 - 工作流依赖
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"